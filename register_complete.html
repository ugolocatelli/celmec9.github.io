	<script>
		function myFunction() {
			var talkYes = document.getElementById("talkyes");
			var talkNo = document.getElementById("talkno");
			var posterYes = document.getElementById("posteryes");
			var posterNo = document.getElementById("posterno");
			
			// Get the output text
			var talkform = document.getElementsByClassName("talkform");
			var posterform = document.getElementsByClassName("posterform");

			// If the checkbox is checked, display the output text
			if (talkYes.checked == true){
				talkform[0].style.display = "block";
				talkform[1].style.display = "block";
			} else {
				talkform[0].style.display = "none";
				talkform[1].style.display = "none";
			}
			if (talkNo.checked == true){
				talkform[0].style.display = "none";
				talkform[1].style.display = "none";
			} else {
				talkform[0].style.display = "block";
				talkform[1].style.display = "block";
			}
			
			if (posterYes.checked == true){
				posterform[0].style.display = "block";
				posterform[1].style.display = "block";
			} else {
				posterform[0].style.display = "none";
				posterform[1].style.display = "none";
			}
			if (posterNo.checked == true){
				posterform[0].style.display = "none";
				posterform[1].style.display = "none";
			} else {
				posterform[0].style.display = "block";
				posterform[1].style.display = "block";
			}
		}
	</script>
